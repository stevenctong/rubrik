<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rubrik Report Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; overflow: hidden; }
    body { display: flex; flex-direction: column; font-family: Arial, sans-serif; background: #f0f2f5; color: #1a1a1a; }

    /* ── Top bar ── */
    .topbar {
      flex-shrink: 0;
      background: #00B2A9; color: white;
      padding: 10px 20px;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      z-index: 100;
    }
    .topbar h1 { font-size: 17px; font-weight: 600; flex: 0 0 auto; margin-right: 8px; }
    .topbar-divider { width: 1px; height: 22px; background: rgba(255,255,255,0.3); flex-shrink: 0; }
    .group-label { color: rgba(255,255,255,0.75); font-size: 12px; white-space: nowrap; }
    .btn-group { display: flex; align-items: center; gap: 4px; }
    input[type="file"] { display: none; }

    .btn { padding: 5px 11px; border-radius: 4px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; }
    .btn-seg           { background: rgba(0,0,0,0.15); color: rgba(255,255,255,0.9); border: 1px solid rgba(255,255,255,0.3); }
    .btn-seg.active    { background: white; color: #00B2A9; border-color: white; }
    .btn-seg:hover:not(.active) { background: rgba(0,0,0,0.1); }

    .topbar-select {
      padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600;
      background: rgba(0,0,0,0.15); color: rgba(255,255,255,0.9);
      border: 1px solid rgba(255,255,255,0.3); cursor: pointer; outline: none;
    }
    .topbar-select:hover { background: rgba(0,0,0,0.25); }
    .topbar-select option { background: #007A73; color: white; }

    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

    .mini-drop {
      border: 2px dashed rgba(255,255,255,0.4); border-radius: 6px;
      padding: 5px 14px; cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      color: rgba(255,255,255,0.85); font-size: 12px; font-weight: 600;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .mini-drop:hover, .mini-drop.drag-over {
      border-color: white; background: rgba(0,0,0,0.1); color: white;
    }

    /* ── Toolbar ── */
    .toolbar {
      flex-shrink: 0;
      background: white; padding: 8px 20px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid #dde2ea; flex-wrap: wrap;
      z-index: 99;
    }
    .search-wrap { position: relative; }
    .search-wrap input {
      padding: 5px 10px 5px 28px;
      border: 1px solid #ccc; border-radius: 5px;
      font-size: 13px; width: 220px; outline: none;
    }
    .search-wrap input:focus { border-color: #00B2A9; }
    .search-icon { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: #999; font-size: 12px; }
    .clear-btn { background: none; border: 1px solid #ccc; border-radius: 4px; padding: 5px 10px; font-size: 12px; cursor: pointer; color: #555; }
    .clear-btn:hover { background: #f5f5f5; }
    .toolbar-right { margin-left: auto; color: #666; font-size: 12px; }

    /* ── Main scrollable area ── */
    #main-scroll { flex: 1; overflow: auto; }

    /* ── Drop zone ── */
    #drop-zone {
      margin: 40px auto; max-width: 480px; background: white;
      border: 2px dashed #b0bcd0; border-radius: 12px;
      padding: 60px 40px; text-align: center; color: #666;
      cursor: pointer; transition: border-color 0.2s, background 0.2s;
    }
    #drop-zone:hover, #drop-zone.drag-over { border-color: #00B2A9; background: #f0fffe; }
    #drop-zone .dz-icon { font-size: 40px; margin-bottom: 12px; }
    #drop-zone p { font-size: 15px; margin-bottom: 6px; }
    #drop-zone small { font-size: 12px; color: #999; }

    /* ── Table ── */
    #table-section { display: none; }

    table { border-collapse: collapse; width: 100%; font-size: 13px; min-width: max-content; }

    thead tr.header-names th {
      background: #007A73; color: white;
      padding: 9px 12px; text-align: left; white-space: nowrap;
      position: sticky; top: 0; z-index: 10;
      user-select: none; cursor: pointer;
      border-right: 1px solid rgba(255,255,255,0.15);
      overflow: hidden;
    }
    thead tr.header-names th:hover { background: #006960; }
    .col-resize-handle {
      position: absolute; right: 0; top: 0; bottom: 0; width: 5px;
      cursor: col-resize; z-index: 20;
    }
    .col-resize-handle:hover { background: rgba(255,255,255,0.3); }
    body.col-resizing { cursor: col-resize !important; user-select: none; }
    body.col-resizing * { cursor: col-resize !important; }
    thead tr.header-names th .col-label { display: flex; align-items: center; gap: 5px; overflow: hidden; }
    thead tr.header-names th .sort-icon { font-size: 10px; opacity: 0.45; margin-left: auto; padding-left: 6px; }
    thead tr.header-names th.sorted-asc  .sort-icon,
    thead tr.header-names th.sorted-desc .sort-icon { opacity: 1; color: #b2f0ec; }

    .col-badge { font-size: 10px; border-radius: 3px; padding: 1px 4px; font-weight: normal; flex-shrink: 0; }
    .cap-badge  { background: #3b7dd8; color: white; }
    .date-badge { background: #2a7a5a; color: #c0f0dd; }
    .dur-badge  { background: #7a4a9a; color: #e8d0ff; }

    thead tr.header-filters th {
      background: #f7f9fc; padding: 3px 5px;
      position: sticky; top: 36px; z-index: 9;
      border-right: 1px solid #dde2ea;
      border-bottom: 2px solid #b0d8d6;
    }
    thead tr.header-filters th input.text-filter {
      width: 100%; padding: 3px 6px;
      border: 1px solid #ccd4e0; border-radius: 4px;
      font-size: 12px; outline: none; background: white;
    }
    thead tr.header-filters th input.text-filter:focus { border-color: #00B2A9; }
    thead tr.header-filters th input.text-filter.has-negative { border-color: #c0392b; background: #fdf2f2; }

    tbody tr { border-bottom: 1px solid #edf0f5; }
    tbody tr:hover { background: #f0fffe; }
    tbody tr:nth-child(even) { background: #fafbfd; }
    tbody tr:nth-child(even):hover { background: #f0fffe; }
    tbody td {
      padding: 7px 12px; border-right: 1px solid #edf0f5;
      white-space: nowrap; max-width: 320px;
      overflow: hidden; text-overflow: ellipsis;
    }
    tbody td.cap-cell  { text-align: right; font-variant-numeric: tabular-nums; }
    tbody td.num-cell  { text-align: right; font-variant-numeric: tabular-nums; }
    tbody td.dur-cell  { text-align: right; font-variant-numeric: tabular-nums; }
    tbody td.date-cell { color: #2a5a4a; font-family: monospace; font-size: 12px; }

    .no-results { text-align: center; padding: 40px; color: #999; font-size: 14px; }

    /* ── Loading & threshold messages ── */
    #loading-msg, #threshold-msg {
      display: none; margin: 40px auto; max-width: 520px; background: white;
      border: 2px solid #b0d8d6; border-radius: 12px;
      padding: 50px 40px; text-align: center; color: #555;
    }
    #loading-msg .dz-icon, #threshold-msg .dz-icon { font-size: 40px; margin-bottom: 12px; }
    #loading-msg p, #threshold-msg p { font-size: 15px; margin-bottom: 8px; }
    #threshold-msg .stat { font-size: 13px; color: #777; margin-bottom: 4px; }
    #threshold-msg .action { font-size: 14px; color: #007A73; font-weight: 600; margin-top: 14px; }

    /* ── Fixed footer ── */
    .app-footer {
      flex-shrink: 0;
      background: #00B2A9; color: white;
      padding: 0 20px;
      height: 40px;
      display: flex; align-items: center; justify-content: space-between;
      font-size: 12px; z-index: 100;
      border-top: 1px solid rgba(0,0,0,0.15);
    }
    .footer-info { flex: 1; }
    .footer-page { display: flex; align-items: center; gap: 10px; }
    .page-btn {
      background: rgba(0,0,0,0.15); color: rgba(255,255,255,0.9);
      border: 1px solid rgba(255,255,255,0.3); border-radius: 4px;
      padding: 3px 10px; font-size: 12px; cursor: pointer;
    }
    .page-btn:hover:not(:disabled) { background: rgba(0,0,0,0.25); color: white; }
    .page-btn:disabled { opacity: 0.35; cursor: default; }
    .page-label { color: rgba(255,255,255,0.75); }

    /* ── Multi-select dropdown ── */
    .ms-wrap { position: relative; }
    .ms-trigger {
      width: 100%; padding: 3px 20px 3px 6px;
      border: 1px solid #ccd4e0; border-radius: 4px;
      font-size: 12px; background: white; cursor: pointer;
      text-align: left; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; color: #333; position: relative;
    }
    .ms-trigger::after { content: '▾'; position: absolute; right: 6px; top: 50%; transform: translateY(-50%); color: #888; font-size: 10px; }
    .ms-trigger.has-selection { border-color: #00B2A9; background: #e6faf9; color: #007A73; font-weight: 600; }

    .ms-panel {
      display: none; position: fixed;
      background: white; border: 1px solid #b0dedd;
      border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      z-index: 500; min-width: 200px; max-width: 320px;
    }
    .ms-panel.open { display: block; }
    .ms-search-wrap { padding: 7px 7px 4px; border-bottom: 1px solid #eee; }
    .ms-search { width: 100%; padding: 4px 7px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; outline: none; }
    .ms-search:focus { border-color: #00B2A9; }
    .ms-actions { display: flex; gap: 8px; padding: 3px 8px 5px; border-bottom: 1px solid #eee; }
    .ms-action-btn { background: none; border: none; cursor: pointer; font-size: 11px; color: #00B2A9; padding: 0; }
    .ms-action-btn:hover { text-decoration: underline; }
    .ms-list { max-height: 220px; overflow-y: auto; padding: 3px 0; }
    .ms-item { display: flex; align-items: center; gap: 7px; padding: 5px 10px; cursor: pointer; font-size: 12px; }
    .ms-item:hover { background: #f0fffe; }
    .ms-item input[type="checkbox"] { cursor: pointer; accent-color: #00B2A9; flex-shrink: 0; }
    .ms-item label { cursor: pointer; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ms-no-match { padding: 10px; text-align: center; color: #999; font-size: 12px; }

    /* ── Summary bar (capacity change mode) ── */
    #summary-bar {
      display: none;
      flex-shrink: 0;
      background: #f7f9fc;
      border-bottom: 2px solid #b0d8d6;
      font-size: 12px;
      color: #333;
      z-index: 98;
    }
    .summary-toggle {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 20px; cursor: pointer; user-select: none;
      font-size: 12px; font-weight: 600; color: #007A73;
    }
    .summary-toggle:hover { background: #eef7f6; }
    .summary-toggle .toggle-icon { font-size: 10px; transition: transform 0.15s; }
    .summary-toggle .toggle-icon.collapsed { transform: rotate(-90deg); }
    #summary-body { padding: 0 20px 8px; }
    .summary-row {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .summary-stat {
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }
    .summary-stat .stat-label { color: #666; }
    .summary-stat .stat-value { font-weight: 600; color: #1a1a1a; }
    .summary-divider { width: 1px; height: 18px; background: #dde2ea; flex-shrink: 0; }
    .summary-metric { display: flex; align-items: center; gap: 4px; }
    .summary-metric .metric-name { color: #666; font-size: 11px; }
    .summary-metric .metric-val { font-weight: 600; font-variant-numeric: tabular-nums; }

    /* ── Change value colors ── */
    .chg-pos { color: #c0392b; }
    .chg-neg { color: #27ae60; }
    .chg-zero { color: #999; }

    /* ── Period checkboxes ── */
    .period-check {
      display: flex; align-items: center; gap: 4px; cursor: pointer;
      font-size: 12px; color: rgba(255,255,255,0.9); user-select: none;
    }
    .period-check input { accent-color: white; cursor: pointer; }

    /* ── Cross-period summary table ── */
    #summary-bar table { border-collapse: collapse; width: auto; font-size: 12px; }
    #summary-bar th {
      padding: 5px 12px; text-align: right; white-space: nowrap;
      color: #00B2A9; font-weight: 600; border-bottom: 2px solid #b0d8d6;
    }
    #summary-bar th:first-child { text-align: left; }
    #summary-bar td {
      padding: 4px 12px; text-align: right; white-space: nowrap;
      border-bottom: 1px solid #edf0f5; font-variant-numeric: tabular-nums;
    }
    #summary-bar td:first-child { text-align: left; font-weight: 600; color: #333; }
    #summary-bar tr:nth-child(even) td { background: #f9f9f9; }
    #summary-bar tr.baseline-row td { font-weight: 600; }

    /* ── Frozen columns (capacity change mode) ── */
    .frozen-col {
      position: sticky;
      z-index: 5;
      background: inherit;
    }
    thead tr.header-names th.frozen-col {
      z-index: 15;
      background: #007A73;
    }
    thead tr.header-names th.frozen-col.chg-col-header {
      background: #005f58;
    }
    thead tr.header-filters th.frozen-col {
      z-index: 14;
      background: #f7f9fc;
    }
    tbody td.frozen-col {
      background: white;
    }
    tbody tr:nth-child(even) td.frozen-col {
      background: #fafbfd;
    }
    tbody tr:hover td.frozen-col {
      background: #f0fffe;
    }
    /* Shadow on last frozen column */
    .frozen-col-last {
      border-right: 2px solid #b0d8d6 !important;
    }

    /* ── Change column header styling ── */
    thead tr.header-names th.chg-col-header { background: #005f58; }
    thead tr.header-names th.chg-col-header:hover { background: #004d47; }
  </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <h1>Rubrik Report Viewer</h1>

  <!-- Timezone -->
  <div class="topbar-divider" id="tz-divider"></div>
  <span class="group-label" id="tz-label">Timezone:</span>
  <div class="btn-group" id="tz-controls">
    <button class="btn btn-seg active" onclick="setTz('UTC')">UTC</button>
    <button class="btn btn-seg" onclick="setTz('America/Los_Angeles')">PT</button>
    <button class="btn btn-seg" onclick="setTz('America/Denver')">MT</button>
    <button class="btn btn-seg" onclick="setTz('America/Chicago')">CT</button>
    <button class="btn btn-seg" onclick="setTz('America/New_York')">ET</button>
  </div>

  <!-- Capacity unit -->
  <div class="topbar-divider" id="cap-divider"></div>
  <span class="group-label" id="cap-label">Capacity:</span>
  <div class="btn-group" id="cap-controls">
    <button class="btn btn-seg active" id="btn-gb" onclick="setUnit('GB')">GB</button>
    <button class="btn btn-seg"        id="btn-tb" onclick="setUnit('TB')">TB</button>
  </div>

  <!-- Duration unit -->
  <div class="topbar-divider" id="dur-divider"></div>
  <span class="group-label" id="dur-label">Duration:</span>
  <div class="btn-group" id="dur-controls">
    <button class="btn btn-seg active" id="btn-sec" onclick="setDurUnit('Seconds')">Sec</button>
    <button class="btn btn-seg"        id="btn-min" onclick="setDurUnit('Minutes')">Min</button>
    <button class="btn btn-seg"        id="btn-hr"  onclick="setDurUnit('Hours')">Hr</button>
  </div>

  <!-- Pre-filters (standard mode) -->
  <div class="topbar-divider" id="prefilter-divider"></div>
  <label id="log-filter-wrap" style="display:flex; cursor:pointer; font-size:12px; color:rgba(255,255,255,0.9); align-items:center; gap:5px; user-select:none;">
    <input type="checkbox" id="log-filter-cb" checked onchange="toggleLogFilter()" style="accent-color:white; cursor:pointer;">
    <span>Filter Log Events</span>
  </label>
  <label id="idx-filter-wrap" style="display:flex; cursor:pointer; font-size:12px; color:rgba(255,255,255,0.9); align-items:center; gap:5px; user-select:none;">
    <input type="checkbox" id="idx-filter-cb" checked onchange="toggleIndexFilter()" style="accent-color:white; cursor:pointer;">
    <span>Filter Index Events</span>
  </label>

  <!-- Row limit (standard mode) -->
  <div class="topbar-divider" id="rowlimit-divider"></div>
  <span class="group-label" id="rowlimit-label">Load:</span>
  <select id="row-limit-sel" class="topbar-select" onchange="setRowLimit()"
    title="Max rows to display. Apply filters to narrow results below this limit.">
    <option value="50000">50k</option>
    <option value="100000">100k</option>
    <option value="200000">200k</option>
    <option value="300000" selected>300k</option>
    <option value="500000">500k</option>
    <option value="1000000">1M</option>
  </select>
  <span class="group-label" id="rowlimit-events-label">events</span>

  <!-- Comparison period selector (capacity change mode) -->
  <div class="topbar-divider" id="period-divider" style="display:none"></div>
  <span class="group-label" id="period-label" style="display:none">Compare:</span>
  <div id="period-checks" style="display:none; align-items:center; gap:10px;"></div>

  <div class="topbar-right">
    <div class="mini-drop" id="mini-drop" onclick="document.getElementById('file-input').click()">
      <span>📂</span>
      <div style="line-height:1.3">
        <div>Import CSV</div>
        <div style="font-weight:normal;font-size:10px;color:rgba(255,255,255,0.65)">click or drag &amp; drop</div>
      </div>
    </div>
    <input type="file" id="file-input" accept=".csv">
  </div>
</div>

<!-- Toolbar -->
<div class="toolbar" id="toolbar" style="display:none">
  <div class="search-wrap">
    <span class="search-icon">&#128269;</span>
    <input type="text" id="global-search" placeholder="Search all columns…" oninput="debouncedApplyFilters()">
  </div>
  <button class="clear-btn" onclick="clearAllFilters()">Clear filters</button>
  <span style="font-size:11px; color:#999;">Comma-separate multiple filters. Use - to exclude (e.g. -Backup).</span>
  <div class="toolbar-right" id="toolbar-info"></div>
</div>

<!-- Summary bar (capacity change mode) -->
<div id="summary-bar">
  <div class="summary-toggle" onclick="toggleSummary()">
    <span class="toggle-icon" id="summary-toggle-icon">&#9660;</span>
    <span>Cross-Period Summary</span>
  </div>
  <div id="summary-body">
    <div class="summary-row" id="summary-content"></div>
  </div>
</div>

<!-- Drop zone -->
<div id="main-scroll">
  <!-- Loading indicator -->
  <div id="loading-msg">
    <div class="dz-icon">&#9203;</div>
    <p id="loading-text">Loading CSV...</p>
  </div>

  <div id="drop-zone" onclick="document.getElementById('file-input').click()">
    <div class="dz-icon">📂</div>
    <p>Click to import a CSV file</p>
    <p>or drag and drop here</p>
    <small>Rubrik report CSV exports</small>
  </div>

  <!-- Table -->
  <div id="table-section">
    <table id="data-table">
      <thead>
        <tr class="header-names"   id="header-names"></tr>
        <tr class="header-filters" id="header-filters"></tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
    <div id="threshold-msg"></div>
  </div>
</div>

<!-- Footer -->
<footer class="app-footer" id="app-footer" style="display:none">
  <div class="footer-info" id="footer-info"></div>
  <div class="footer-page">
    <button class="page-btn" id="btn-prev" onclick="prevPage()">&#8592; Prev</button>
    <span class="page-label" id="page-label"></span>
    <button class="page-btn" id="btn-next" onclick="nextPage()">Next &#8594;</button>
  </div>
</footer>

<!-- Multi-select panel (shared) -->
<div class="ms-panel" id="ms-panel">
  <div class="ms-search-wrap">
    <input class="ms-search" id="ms-search" type="text" placeholder="Search values…" oninput="renderMsItems()">
  </div>
  <div class="ms-actions">
    <button class="ms-action-btn" onclick="msSelectAll()">Select all</button>
    <button class="ms-action-btn" onclick="msClearAll()">Clear</button>
  </div>
  <div class="ms-list" id="ms-list"></div>
</div>

<script>
  // ── Pre-filters ────────────────────────────────────────────────────
  const LOG_FILTER_RE   = /^log/i;    // TaskType values starting with "Log"
  const INDEX_FILTER_RE = /^index$/i; // TaskType value "Index" (exact match)

  // ── Column-type keywords ───────────────────────────────────────────
  // Exact normalized column names that are capacities
  const CAP_EXACT    = new Set(['logicalbytes','bytestransferred','localmetereddata']);
  // Substring matches (normalized) — anything containing these is a capacity
  const CAP_CONTAINS = ['size','storage','datatransferred','datastored'];
  const ENUM_KEYWORDS = ['taskstatus','tasktype','objecttype','clustername'];
  const DATE_NAME_RE    = /(Time|Date|Snapshot|Stamp|On)$/;
  const DATE_VAL_RE     = /^\d{4}-\d{2}-\d{2}/;
  const DATE_EXPLICIT   = ['starttime','endtime']; // always treat as date regardless of value format

  function normCol(n)       { return n.toLowerCase().replace(/[\s_]/g,''); }
  function isCapCol(name)   { const n=normCol(name); return CAP_EXACT.has(n) || CAP_CONTAINS.some(k=>n.includes(k)); }
  function isDurCol(name)   { return normCol(name).includes('duration'); }
  function isEnumCol(name)  { const n=normCol(name); return ENUM_KEYWORDS.some(k=>n.includes(k)); }
  function isDateCol(name, ci) {
    const norm = normCol(name);
    if (DATE_EXPLICIT.includes(norm)) return true;
    if (!DATE_NAME_RE.test(name)) return false;
    const sample = rawRows.slice(0,20).find(r => r[ci] && DATE_VAL_RE.test(r[ci]));
    return !!sample;
  }

  // ── State ──────────────────────────────────────────────────────────
  const PAGE_SIZE = 10000;

  let rawRows     = [];
  let columns     = [];
  let capCols     = [];
  let durCols     = [];
  let numCols     = [];
  let enumCols    = [];
  let dateCols    = [];
  let enumValues  = {};
  let enumFilters = {};
  let colFilters  = [];
  let unit        = 'GB';
  let durUnit     = 'Seconds';
  let tz          = 'UTC';        // timezone string
  let tzLabel     = 'UTC';
  let sortCol     = -1;
  let sortAsc     = true;
  let filterLogEvents   = true;    // log event filter toggle (default on)
  let filterIndexEvents = true;    // index event filter toggle (default on)
  let taskTypeColIdx    = -1;      // index of TaskType column (-1 if absent)
  let rowLimit          = 300000;  // display threshold, controlled by dropdown
  let effectiveRows     = [];      // rawRows after pre-filtering
  let displayRows     = [];        // filtered+sorted full result
  let currentPage     = 0;

  // ── Column reordering (standard mode) ───────────────────────────────
  const PRIORITY_COLS = ['Cluster Name', 'Object Name', 'Location'];
  const STD_FROZEN_COUNT = 3; // freeze the priority columns
  let stdColOrder     = [];   // array of raw column indices in display order
  let stdFrozenMeta   = [];   // { displayIdx, rawIdx, frozen, frozenLast } for frozen cols
  let stdHasPriority  = false;

  function buildStdColOrder() {
    const priorityIndices = [];
    PRIORITY_COLS.forEach(name => {
      const idx = columns.findIndex(c => c === name);
      if (idx >= 0) priorityIndices.push(idx);
    });
    stdHasPriority = priorityIndices.length === PRIORITY_COLS.length;
    if (stdHasPriority) {
      const prioritySet = new Set(priorityIndices);
      const rest = columns.map((_, i) => i).filter(i => !prioritySet.has(i));
      stdColOrder = [...priorityIndices, ...rest];
    } else {
      stdColOrder = columns.map((_, i) => i);
    }
  }

  // ── Capacity Change Mode ──────────────────────────────────────────
  const CAP_CHANGE_PERIOD_RE = /-\d+\s+(Days|Months)/;
  const CAP_METRICS = ['Logical Bytes', 'Used Size', 'Data Stored', 'Archive Storage', 'Replica Storage'];
  let isCapChangeMode   = false;
  let capChangePeriods  = [];       // e.g. ["-1 Months", "-3 Months", ...]
  let selectedPeriods   = new Set();// currently selected periods for detail table
  let capChangeColMap   = {};       // period -> { metricName: { value: colIdx, change: colIdx } }
  let visibleColIndices = [];       // raw CSV column indices in display order
  let visibleColMeta    = [];       // { rawIdx, isChange, label } for each visible column

  const DIVISOR     = { GB: 1e9, TB: 1e12 };
  const DUR_DIVISOR = { Seconds: 1, Minutes: 60, Hours: 3600 };
  const TZ_MAP  = {
    'UTC': 'UTC',
    'America/Los_Angeles': 'PT',
    'America/Denver':      'MT',
    'America/Chicago':     'CT',
    'America/New_York':    'ET'
  };

  // ── File input / drag-drop ─────────────────────────────────────────
  document.getElementById('file-input').addEventListener('change', e => {
    if (e.target.files[0]) loadFile(e.target.files[0]);
  });
  const dz = document.getElementById('drop-zone');
  dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
  });

  const md = document.getElementById('mini-drop');
  md.addEventListener('dragover',  e => { e.preventDefault(); md.classList.add('drag-over'); });
  md.addEventListener('dragleave', () => md.classList.remove('drag-over'));
  md.addEventListener('drop', e => {
    e.preventDefault(); md.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
  });
  function loadFile(f) {
    showLoading('Loading CSV...');
    const r = new FileReader();
    r.onload = e => setTimeout(() => parseCSV(e.target.result), 50);
    r.readAsText(f);
  }

  function showLoading(msg) {
    document.getElementById('loading-text').textContent = msg || 'Loading CSV...';
    document.getElementById('loading-msg').style.display = 'block';
    document.getElementById('drop-zone').style.display   = 'none';
    document.getElementById('table-section').style.display = 'none';
  }
  function hideLoading() { document.getElementById('loading-msg').style.display = 'none'; }

  // ── CSV parser ─────────────────────────────────────────────────────
  // Join continuation lines when a quoted field spans multiple lines
  function joinQuotedLines(lines) {
    const result = [];
    let current = '';
    let open = false;
    for (let i = 0; i < lines.length; i++) {
      if (open) {
        current += '\n' + lines[i];
      } else {
        current = lines[i];
      }
      // Count unescaped quotes to determine if a field is still open
      let quotes = 0;
      for (let j = 0; j < lines[i].length; j++) {
        if (lines[i][j] === '"') quotes++;
      }
      // Odd number of quotes toggles the open state
      if (quotes % 2 === 1) open = !open;
      if (!open) {
        result.push(current);
        current = '';
      }
    }
    // If still open at end, push whatever we have
    if (current) result.push(current);
    return result;
  }

  function parseCSV(text) {
    const rawLines = text.trim().split(/\r?\n/);
    if (rawLines.length < 2) { hideLoading(); return; }

    document.getElementById('loading-text').textContent =
      `Parsing ${(rawLines.length - 1).toLocaleString()} rows...`;

    const lines = joinQuotedLines(rawLines);
    columns     = parseLine(lines[0]);
    rawRows     = lines.slice(1).map(parseLine);
    capCols     = columns.map(c => isCapCol(c));
    durCols     = columns.map(c => isDurCol(c));
    enumCols    = columns.map(c => isEnumCol(c));
    dateCols    = columns.map((c, ci) => isDateCol(c, ci));
    colFilters  = columns.map(() => '');
    enumFilters = {};
    enumValues  = {};

    // Detect TaskType column
    taskTypeColIdx = columns.findIndex(c => normCol(c) === 'tasktype');
    document.getElementById('log-filter-cb').checked = filterLogEvents;

    // Apply log filter and build effectiveRows
    applyPreFilters();

    // Build enum values from effectiveRows
    columns.forEach((_, ci) => {
      if (!enumCols[ci]) return;
      enumValues[ci]  = [...new Set(effectiveRows.map(r=>r[ci]).filter(v=>v!==''))].sort();
      enumFilters[ci] = new Set();
    });

    numCols = columns.map((_, ci) => {
      if (capCols[ci] || durCols[ci] || enumCols[ci] || dateCols[ci]) return false;
      const sample = effectiveRows.slice(0,10).map(r=>r[ci]);
      return sample.every(v => v==='' || !isNaN(Number(v)));
    });

    document.getElementById('drop-zone').style.display = 'none';
    document.getElementById('toolbar').style.display   = 'flex';
    document.getElementById('app-footer').style.display = 'flex';

    // Build standard column order (priority columns first)
    buildStdColOrder();

    // Detect capacity change mode
    detectCapChangeMode();
    configureTopbar();

    sortCol = -1; sortAsc = true; currentPage = 0;
    document.getElementById('table-section').style.display = 'block';
    buildHeaders();
    hideLoading();
    if (isCapChangeMode) {
      applyFilters();
    } else {
      checkThreshold();
    }
  }

  function parseLine(line) {
    const result=[]; let cur='', inQ=false;
    for (let i=0; i<line.length; i++) {
      const ch=line[i];
      if (ch==='"') { if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ; }
      else if (ch===','&&!inQ) { result.push(cur); cur=''; }
      else cur+=ch;
    }
    result.push(cur);
    return result;
  }

  // ── Pre-filters & threshold ─────────────────────────────────────────
  function applyPreFilters() {
    let rows = rawRows;
    if (filterLogEvents && taskTypeColIdx >= 0)
      rows = rows.filter(r => !LOG_FILTER_RE.test(r[taskTypeColIdx]));
    if (filterIndexEvents && taskTypeColIdx >= 0)
      rows = rows.filter(r => !INDEX_FILTER_RE.test(r[taskTypeColIdx]));
    effectiveRows = rows;
  }

  function checkThreshold() {
    document.getElementById('table-section').style.display = 'block';
    if (effectiveRows.length > rowLimit) {
      document.getElementById('table-body').innerHTML = '';
      showThresholdMessage(effectiveRows.length);
    } else {
      document.getElementById('threshold-msg').style.display = 'none';
      applyFilters();
    }
  }

  function showThresholdMessage(filteredCount) {
    const total = rawRows.length;
    const logCount = (taskTypeColIdx >= 0 && filterLogEvents)
      ? rawRows.filter(r => LOG_FILTER_RE.test(r[taskTypeColIdx])).length : 0;
    const idxCount = (taskTypeColIdx >= 0 && filterIndexEvents)
      ? rawRows.filter(r => INDEX_FILTER_RE.test(r[taskTypeColIdx])).length : 0;
    const el = document.getElementById('threshold-msg');
    let html = `<div class="dz-icon">&#128202;</div>`;
    html += `<p style="font-size:17px;font-weight:600;color:#333;">Dataset Too Large to Display</p>`;
    html += `<p class="stat">Total rows: ${total.toLocaleString()}</p>`;
    if (logCount > 0)
      html += `<p class="stat">Log events filtered: ${logCount.toLocaleString()}</p>`;
    if (idxCount > 0)
      html += `<p class="stat">Index events filtered: ${idxCount.toLocaleString()}</p>`;
    html += `<p class="stat">Remaining rows: ${filteredCount.toLocaleString()}</p>`;
    html += `<p class="action">Apply filters to narrow below ${rowLimit.toLocaleString()} rows</p>`;
    el.innerHTML = html;
    el.style.display = 'block';
    updateFooter();
  }

  function toggleLogFilter() {
    filterLogEvents = document.getElementById('log-filter-cb').checked;
    applyPreFilters();
    // Rebuild enum values from effectiveRows
    columns.forEach((_, ci) => {
      if (!enumCols[ci]) return;
      enumValues[ci] = [...new Set(effectiveRows.map(r=>r[ci]).filter(v=>v!==''))].sort();
      // Remove any enum filter selections that no longer exist
      const valid = new Set(enumValues[ci]);
      enumFilters[ci] = new Set([...enumFilters[ci]].filter(v => valid.has(v)));
      updateMsTrigger(ci);
    });
    checkThreshold();
  }

  function toggleIndexFilter() {
    filterIndexEvents = document.getElementById('idx-filter-cb').checked;
    applyPreFilters();
    columns.forEach((_, ci) => {
      if (!enumCols[ci]) return;
      enumValues[ci] = [...new Set(effectiveRows.map(r=>r[ci]).filter(v=>v!==''))].sort();
      const valid = new Set(enumValues[ci]);
      enumFilters[ci] = new Set([...enumFilters[ci]].filter(v => valid.has(v)));
      updateMsTrigger(ci);
    });
    checkThreshold();
  }

  function setRowLimit() {
    rowLimit = parseInt(document.getElementById('row-limit-sel').value);
    if (rawRows.length > 0) checkThreshold();
  }

  // ── Headers ────────────────────────────────────────────────────────
  function buildHeaders() {
    const table = document.getElementById('data-table');
    table.style.tableLayout = '';
    table.style.width = '';
    table.style.minWidth = '';
    const nameRow   = document.getElementById('header-names');
    const filterRow = document.getElementById('header-filters');
    nameRow.innerHTML = '';
    filterRow.innerHTML = '';

    if (isCapChangeMode) {
      buildVisibleCols();
      // Compute left offsets for frozen columns after first render pass
      const frozenWidths = [];
      visibleColMeta.forEach((meta, vi) => {
        const ci = meta.rawIdx;
        const col = meta.label;
        const th = document.createElement('th');
        if (meta.isChange) th.classList.add('chg-col-header');
        if (meta.frozen) {
          th.classList.add('frozen-col');
          if (meta.frozenLast) th.classList.add('frozen-col-last');
        }
        let badge = '';
        if (capCols[ci]) badge = `<span class="col-badge cap-badge">${unit}</span>`;
        th.innerHTML = `<div class="col-label"><span>${escHtml(col)}</span>${badge}<span class="sort-icon">⇅</span></div>`;
        th.onclick = () => sortBy(ci);
        nameRow.appendChild(th);

        const tf = document.createElement('th');
        if (meta.frozen) {
          tf.classList.add('frozen-col');
          if (meta.frozenLast) tf.classList.add('frozen-col-last');
        }
        if (enumCols[ci]) {
          const wrap = document.createElement('div');
          wrap.className = 'ms-wrap';
          const btn = document.createElement('button');
          btn.className   = 'ms-trigger';
          btn.dataset.ci  = ci;
          btn.textContent = 'All';
          btn.onclick     = e => { e.stopPropagation(); openMsPanel(ci, btn); };
          wrap.appendChild(btn);
          tf.appendChild(wrap);
        } else {
          const inp = document.createElement('input');
          inp.type      = 'text';
          inp.className = 'text-filter';
          inp.placeholder = 'Filter…';
          inp.oninput   = function() { colFilters[ci]=this.value.toLowerCase(); this.classList.toggle('has-negative', /(?:^|,)\s*-/.test(this.value)); debouncedApplyFilters(); };
          tf.appendChild(inp);
        }
        filterRow.appendChild(tf);
      });
      // Compute frozen left offsets synchronously (table section already visible)
      {
        const ths = nameRow.querySelectorAll('th');
        const tfs = filterRow.querySelectorAll('th');
        let leftOffset = 0;
        visibleColMeta._frozenOffsets = [];
        visibleColMeta.forEach((meta, vi) => {
          if (meta.frozen) {
            ths[vi].style.left = leftOffset + 'px';
            tfs[vi].style.left = leftOffset + 'px';
            visibleColMeta._frozenOffsets.push(leftOffset);
            leftOffset += ths[vi].offsetWidth;
          }
        });
      }
    } else {
      const colOrder = stdColOrder.length ? stdColOrder : columns.map((_, i) => i);
      colOrder.forEach((ci, displayIdx) => {
        const col = columns[ci];
        const th = document.createElement('th');
        const isFrozen = stdHasPriority && displayIdx < STD_FROZEN_COUNT;
        const isFrozenLast = stdHasPriority && displayIdx === STD_FROZEN_COUNT - 1;
        if (isFrozen) {
          th.classList.add('frozen-col');
          if (isFrozenLast) th.classList.add('frozen-col-last');
        }
        let badge = '';
        if (capCols[ci])  badge = `<span class="col-badge cap-badge">${unit}</span>`;
        if (durCols[ci])  badge = `<span class="col-badge dur-badge">${durUnit}</span>`;
        if (dateCols[ci]) badge = `<span class="col-badge date-badge">${tzLabel}</span>`;
        th.innerHTML = `<div class="col-label"><span>${escHtml(col)}</span>${badge}<span class="sort-icon">⇅</span></div>`;
        th.onclick = () => sortBy(ci);
        nameRow.appendChild(th);

        const tf = document.createElement('th');
        if (isFrozen) {
          tf.classList.add('frozen-col');
          if (isFrozenLast) tf.classList.add('frozen-col-last');
        }
        if (enumCols[ci]) {
          const wrap = document.createElement('div');
          wrap.className = 'ms-wrap';
          const btn = document.createElement('button');
          btn.className   = 'ms-trigger';
          btn.dataset.ci  = ci;
          btn.textContent = 'All';
          btn.onclick     = e => { e.stopPropagation(); openMsPanel(ci, btn); };
          wrap.appendChild(btn);
          tf.appendChild(wrap);
        } else {
          const inp = document.createElement('input');
          inp.type      = 'text';
          inp.className = 'text-filter';
          inp.placeholder = 'Filter…';
          inp.oninput   = function() { colFilters[ci]=this.value.toLowerCase(); this.classList.toggle('has-negative', /(?:^|,)\s*-/.test(this.value)); debouncedApplyFilters(); };
          tf.appendChild(inp);
        }
        filterRow.appendChild(tf);
      });
      // Compute frozen offsets synchronously (table section already visible)
      if (stdHasPriority) {
        const ths = nameRow.querySelectorAll('th');
        const tfs = filterRow.querySelectorAll('th');
        let leftOffset = 0;
        stdFrozenMeta = [];
        for (let i = 0; i < STD_FROZEN_COUNT && i < ths.length; i++) {
          ths[i].style.left = leftOffset + 'px';
          tfs[i].style.left = leftOffset + 'px';
          stdFrozenMeta.push({ displayIdx: i, rawIdx: colOrder[i], left: leftOffset });
          leftOffset += ths[i].offsetWidth;
        }
      }
    }
    attachResizeHandles();
  }

  function updateColBadges() {
    document.querySelectorAll('#header-names th').forEach((th, displayIdx) => {
      const badge = th.querySelector('.col-badge');
      if (!badge) return;
      let ci;
      if (isCapChangeMode && visibleColMeta[displayIdx]) ci = visibleColMeta[displayIdx].rawIdx;
      else if (!isCapChangeMode && stdColOrder.length) ci = stdColOrder[displayIdx];
      else ci = displayIdx;
      if (capCols[ci])  badge.textContent = unit;
      if (durCols[ci])  badge.textContent = durUnit;
      if (dateCols[ci]) badge.textContent = tzLabel;
    });
  }

  // ── Multi-select panel ─────────────────────────────────────────────
  let activeMsCi = -1;

  function openMsPanel(ci, triggerEl) {
    if (activeMsCi === ci) { closeMsPanel(); return; }
    activeMsCi = ci;
    document.getElementById('ms-search').value = '';
    const panel = document.getElementById('ms-panel');
    panel.classList.add('open');
    const rect = triggerEl.getBoundingClientRect();
    panel.style.top  = (rect.bottom + 2) + 'px';
    panel.style.left = rect.left + 'px';
    renderMsItems();
    setTimeout(() => document.getElementById('ms-search').focus(), 0);
  }
  function closeMsPanel() { document.getElementById('ms-panel').classList.remove('open'); activeMsCi=-1; }

  function renderMsItems() {
    if (activeMsCi < 0) return;
    const ci    = activeMsCi;
    const query = document.getElementById('ms-search').value.toLowerCase();
    const vals  = enumValues[ci] || [];
    const sel   = enumFilters[ci];
    const shown = query ? vals.filter(v=>v.toLowerCase().includes(query)) : vals;
    const list  = document.getElementById('ms-list');
    if (!shown.length) { list.innerHTML='<div class="ms-no-match">No matches</div>'; return; }
    list.innerHTML = shown.map(v => {
      const id = `mscb-${ci}-${escHtml(v)}`;
      return `<div class="ms-item">
        <input type="checkbox" id="${id}" ${sel.has(v)?'checked':''} onchange="msTog('${escJs(v)}')">
        <label for="${id}">${escHtml(v)}</label>
      </div>`;
    }).join('');
  }

  function msTog(val) {
    if (activeMsCi<0) return;
    const s=enumFilters[activeMsCi]; s.has(val)?s.delete(val):s.add(val);
    updateMsTrigger(activeMsCi); debouncedApplyFilters();
  }
  function msSelectAll() {
    if (activeMsCi<0) return;
    const q=document.getElementById('ms-search').value.toLowerCase();
    const vals=enumValues[activeMsCi]||[];
    (q?vals.filter(v=>v.toLowerCase().includes(q)):vals).forEach(v=>enumFilters[activeMsCi].add(v));
    renderMsItems(); updateMsTrigger(activeMsCi); debouncedApplyFilters();
  }
  function msClearAll() {
    if (activeMsCi<0) return;
    const q=document.getElementById('ms-search').value.toLowerCase();
    const vals=enumValues[activeMsCi]||[];
    (q?vals.filter(v=>v.toLowerCase().includes(q)):vals).forEach(v=>enumFilters[activeMsCi].delete(v));
    renderMsItems(); updateMsTrigger(activeMsCi); debouncedApplyFilters();
  }
  function updateMsTrigger(ci) {
    const btn=document.querySelector(`.ms-trigger[data-ci="${ci}"]`);
    if (!btn) return;
    const s=enumFilters[ci], total=(enumValues[ci]||[]).length;
    if (s.size===0) { btn.textContent='All'; btn.classList.remove('has-selection'); }
    else { btn.textContent=s.size===total?`All (${total})`:`${s.size} of ${total} selected`; btn.classList.add('has-selection'); }
  }

  document.addEventListener('click', e => {
    if (activeMsCi>=0 && !document.getElementById('ms-panel').contains(e.target) && !e.target.classList.contains('ms-trigger'))
      closeMsPanel();
  });
  document.addEventListener('keydown', e => { if(e.key==='Escape') closeMsPanel(); });

  // ── Sorting ────────────────────────────────────────────────────────
  function sortBy(ci) {
    if (sortCol===ci) sortAsc=!sortAsc; else { sortCol=ci; sortAsc=true; }
    applyFilters();
  }
  function updateSortIcons() {
    document.querySelectorAll('#header-names th').forEach((th, displayIdx) => {
      th.classList.remove('sorted-asc','sorted-desc');
      const icon=th.querySelector('.sort-icon');
      // Map display index to raw column index
      let rawIdx;
      if (isCapChangeMode && visibleColMeta[displayIdx]) rawIdx = visibleColMeta[displayIdx].rawIdx;
      else if (!isCapChangeMode && stdColOrder.length) rawIdx = stdColOrder[displayIdx];
      else rawIdx = displayIdx;
      if (rawIdx===sortCol) { th.classList.add(sortAsc?'sorted-asc':'sorted-desc'); icon.textContent=sortAsc?'↑':'↓'; }
      else icon.textContent='⇅';
    });
  }

  // ── Filter + sort ──────────────────────────────────────────────────
  function applyFilters() {
    const globalQ = document.getElementById('global-search').value.toLowerCase();
    const globalTerms = parseFilterTerms(globalQ);

    displayRows = effectiveRows.filter(row => {
      // Global search: positive terms (OR across columns), negative terms (exclude if any column matches)
      if (globalTerms.positive.length > 0) {
        if (!globalTerms.positive.some(term => row.some(v => v.toLowerCase().includes(term)))) return false;
      }
      if (globalTerms.negative.length > 0) {
        if (globalTerms.negative.some(term => row.some(v => v.toLowerCase().includes(term)))) return false;
      }
      // Per-column filters: positive terms (OR), negative terms (exclude)
      for (let ci = 0; ci < colFilters.length; ci++) {
        if (!colFilters[ci]) continue;
        const terms = parseFilterTerms(colFilters[ci]);
        const cell = row[ci].toLowerCase();
        if (terms.positive.length > 0 && !terms.positive.some(t => cell.includes(t))) return false;
        if (terms.negative.length > 0 && terms.negative.some(t => cell.includes(t))) return false;
      }
      for (const ci in enumFilters) {
        const s=enumFilters[ci];
        if (s.size>0 && !s.has(row[ci])) return false;
      }
      return true;
    });

    // Re-check threshold when dataset is large
    if (effectiveRows.length > rowLimit) {
      if (displayRows.length > rowLimit) {
        document.getElementById('table-body').innerHTML = '';
        showThresholdMessage(displayRows.length);
        updateSortIcons();
        return;
      } else {
        document.getElementById('threshold-msg').style.display = 'none';
      }
    }

    if (sortCol>=0) {
      const isNum=capCols[sortCol]||durCols[sortCol]||numCols[sortCol];
      displayRows.sort((a,b) => {
        let va=a[sortCol], vb=b[sortCol];
        if (isNum) { va=parseFloat(va)||0; vb=parseFloat(vb)||0; }
        else       { va=va.toLowerCase();  vb=vb.toLowerCase(); }
        return sortAsc ? (va>vb?1:va<vb?-1:0) : (va<vb?1:va>vb?-1:0);
      });
    }

    currentPage = 0;
    renderPage();
    updateSortIcons();
    updateFooter();
    if (isCapChangeMode) updateSummary();
  }

  // ── Pagination ─────────────────────────────────────────────────────
  function renderPage() {
    const start = currentPage * PAGE_SIZE;
    renderRows(displayRows.slice(start, start + PAGE_SIZE));
    document.getElementById('main-scroll').scrollTop = 0;
  }

  function prevPage() {
    if (currentPage > 0) { currentPage--; renderPage(); updateFooter(); }
  }
  function nextPage() {
    const total = Math.ceil(displayRows.length / PAGE_SIZE);
    if (currentPage < total-1) { currentPage++; renderPage(); updateFooter(); }
  }

  function updateFooter() {
    const total     = effectiveRows.length;
    const filtered  = displayRows.length;
    const totalPages = Math.max(1, Math.ceil(filtered / PAGE_SIZE));
    const start     = currentPage * PAGE_SIZE + 1;
    const end       = Math.min((currentPage + 1) * PAGE_SIZE, filtered);

    let info = filtered === total
      ? `${total.toLocaleString()} rows`
      : `${filtered.toLocaleString()} of ${total.toLocaleString()} rows (filtered)`;
    if (filtered > PAGE_SIZE)
      info += ` — showing ${start.toLocaleString()}–${end.toLocaleString()}`;

    document.getElementById('footer-info').textContent  = info;
    document.getElementById('page-label').textContent   = `Page ${currentPage+1} of ${totalPages}`;
    document.getElementById('btn-prev').disabled        = currentPage === 0;
    document.getElementById('btn-next').disabled        = currentPage >= totalPages-1;

    // Also update toolbar info
    document.getElementById('toolbar-info').textContent =
      filtered === total ? `${total.toLocaleString()} rows`
                         : `${filtered.toLocaleString()} of ${total.toLocaleString()} rows`;
  }

  // ── Render rows ────────────────────────────────────────────────────
  function renderRows(rows) {
    const div   = DIVISOR[unit];
    const tbody = document.getElementById('table-body');

    if (isCapChangeMode) {
      const colCount = visibleColMeta.length;
      if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="${colCount}" class="no-results">No matching rows</td></tr>`;
        return;
      }
      // Build a set of change column raw indices for quick lookup
      const changeRawIdxSet = new Set(visibleColMeta.filter(m => m.isChange).map(m => m.rawIdx));

      // Pre-compute frozen left offsets from header widths
      const frozenOffsets = [];
      if (visibleColMeta._frozenOffsets) {
        frozenOffsets.push(...visibleColMeta._frozenOffsets);
      }

      tbody.innerHTML = rows.map(row =>
        '<tr>' + visibleColMeta.map((meta, vi) => {
          const ci = meta.rawIdx;
          const val = row[ci];
          let frozenStyle = '';
          let frozenClass = '';
          if (meta.frozen) {
            let fi = 0;
            for (let k = 0; k < vi; k++) { if (visibleColMeta[k].frozen) fi++; }
            frozenClass = ' frozen-col' + (meta.frozenLast ? ' frozen-col-last' : '');
            frozenStyle = ` style="left:${frozenOffsets[fi] || 0}px"`;
          }
          if (meta.isChange) {
            const num = parseFloat(val) || 0;
            const displayVal = unit === 'TB' ? (num / 1000).toFixed(2) : parseFloat(num).toFixed(2);
            const sign = num > 0 ? '+' : '';
            const cls = num > 0 ? 'chg-pos' : num < 0 ? 'chg-neg' : 'chg-zero';
            return `<td class="cap-cell ${cls}${frozenClass}"${frozenStyle}>${sign}${displayVal}</td>`;
          }
          if (capCols[ci]) {
            const num = parseFloat(val);
            const displayVal = unit === 'TB' ? (num / 1000).toFixed(2) : parseFloat(num).toFixed(2);
            return `<td class="cap-cell${frozenClass}"${frozenStyle}>${isNaN(num) ? escHtml(val) : displayVal}</td>`;
          }
          if (numCols[ci]) return `<td class="num-cell${frozenClass}"${frozenStyle}>${escHtml(val)}</td>`;
          return `<td class="${frozenClass.trim()}"${frozenStyle} title="${escHtml(val)}">${escHtml(val)}</td>`;
        }).join('') + '</tr>'
      ).join('');
      return;
    }

    const colOrder = stdColOrder.length ? stdColOrder : columns.map((_, i) => i);
    if (!rows.length) {
      tbody.innerHTML = `<tr><td colspan="${colOrder.length}" class="no-results">No matching rows</td></tr>`;
      return;
    }
    tbody.innerHTML = rows.map(row =>
      '<tr>' + colOrder.map((ci, displayIdx) => {
        const val = row[ci];
        let frozenClass = '';
        let frozenStyle = '';
        if (stdHasPriority && displayIdx < STD_FROZEN_COUNT) {
          frozenClass = ' frozen-col' + (displayIdx === STD_FROZEN_COUNT - 1 ? ' frozen-col-last' : '');
          const meta = stdFrozenMeta[displayIdx];
          frozenStyle = ` style="left:${meta ? meta.left : 0}px"`;
        }
        if (capCols[ci]) {
          const num = parseFloat(val);
          return `<td class="cap-cell${frozenClass}"${frozenStyle}>${isNaN(num) ? escHtml(val) : (num/div).toFixed(2)}</td>`;
        }
        if (durCols[ci]) {
          const num = parseFloat(val);
          const dd  = DUR_DIVISOR[durUnit];
          return `<td class="dur-cell${frozenClass}"${frozenStyle}>${isNaN(num) ? escHtml(val) : (num/dd).toFixed(2)}</td>`;
        }
        if (dateCols[ci]) {
          return `<td class="date-cell${frozenClass}"${frozenStyle}>${escHtml(convertDate(val))}</td>`;
        }
        if (numCols[ci]) return `<td class="num-cell${frozenClass}"${frozenStyle}>${escHtml(val)}</td>`;
        return `<td class="${frozenClass.trim()}"${frozenStyle} title="${escHtml(val)}">${escHtml(val)}</td>`;
      }).join('') + '</tr>'
    ).join('');
  }

  // ── Timezone ───────────────────────────────────────────────────────
  function setTz(tzStr) {
    tz = tzStr;
    tzLabel = TZ_MAP[tzStr] || tzStr;
    document.querySelectorAll('#tz-controls .btn-seg').forEach(b => {
      b.classList.toggle('active', b.textContent === tzLabel);
    });
    updateColBadges();
    renderPage(); // re-render with new tz (no re-filter needed)
  }

  function convertDate(val) {
    if (!val || !DATE_VAL_RE.test(val)) return val;
    const d = new Date(val);
    if (isNaN(d.getTime())) return val;
    try {
      const parts = new Intl.DateTimeFormat('en-US', {
        timeZone: tz === 'UTC' ? 'UTC' : tz,
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        hour12: false
      }).formatToParts(d);
      const p = {};
      parts.forEach(({ type, value }) => p[type] = value);
      return `${p.year}-${p.month}-${p.day} ${p.hour}:${p.minute}:${p.second}`;
    } catch { return val; }
  }

  // ── Capacity unit ──────────────────────────────────────────────────
  function setUnit(u) {
    unit = u;
    document.getElementById('btn-gb').classList.toggle('active', u==='GB');
    document.getElementById('btn-tb').classList.toggle('active', u==='TB');
    updateColBadges();
    renderPage();
    if (isCapChangeMode) updateSummary();
  }

  // ── Duration unit ──────────────────────────────────────────────────
  function setDurUnit(u) {
    durUnit = u;
    document.getElementById('btn-sec').classList.toggle('active', u==='Seconds');
    document.getElementById('btn-min').classList.toggle('active', u==='Minutes');
    document.getElementById('btn-hr' ).classList.toggle('active', u==='Hours');
    updateColBadges();
    renderPage();
  }

  // ── Clear filters ──────────────────────────────────────────────────
  function clearAllFilters() {
    document.getElementById('global-search').value = '';
    colFilters = columns.map(() => '');
    document.querySelectorAll('.text-filter').forEach(i => i.value = '');
    columns.forEach((_, ci) => {
      if (!enumCols[ci]) return;
      enumFilters[ci] = new Set();
      updateMsTrigger(ci);
    });
    closeMsPanel();
    applyFilters();
  }

  // ── Capacity Change Mode ────────────────────────────────────────────
  function detectCapChangeMode() {
    isCapChangeMode = false;
    capChangePeriods = [];
    capChangeColMap = {};
    selectedPeriods = new Set();
    visibleColIndices = [];
    visibleColMeta = [];

    // Scan headers for period pattern like "-1 Months" or "-7 Days"
    const periodSet = new Set();
    columns.forEach(col => {
      const m = col.match(/-\d+\s+(Days|Months)/);
      if (m) periodSet.add(m[0]);
    });
    if (periodSet.size === 0) return;

    isCapChangeMode = true;

    // Sort periods by absolute numeric value (shortest first)
    capChangePeriods = [...periodSet].sort((a, b) => {
      const na = parseInt(a.match(/-(\d+)/)[1]);
      const nb = parseInt(b.match(/-(\d+)/)[1]);
      return na - nb;
    });

    // Build column map: for each period, find the value and change columns per metric
    capChangePeriods.forEach(period => {
      capChangeColMap[period] = {};
      CAP_METRICS.forEach(metric => {
        const valName = `${metric} (GB) ${period}`;
        const chgName = `${metric} Change (GB) ${period}`;
        const valIdx = columns.indexOf(valName);
        const chgIdx = columns.indexOf(chgName);
        capChangeColMap[period][metric] = { value: valIdx, change: chgIdx };
      });
    });

    selectedPeriods = new Set([capChangePeriods[0]]);
  }

  function buildVisibleCols() {
    visibleColMeta = [];
    // Sorted periods in display order (by magnitude)
    const sortedSelected = capChangePeriods.filter(p => selectedPeriods.has(p));

    // Identity columns in desired order — first 3 are frozen
    const identityCols = ['Cluster Name', 'Object Name', 'Location', 'Object Type'];
    const FROZEN_COUNT = 3; // freeze Cluster, Object Name, Location
    identityCols.forEach((name, i) => {
      const idx = columns.indexOf(name);
      if (idx >= 0) visibleColMeta.push({
        rawIdx: idx, isChange: false, label: name,
        frozen: i < FROZEN_COUNT, frozenLast: i === FROZEN_COUNT - 1
      });
    });

    // Capacity metrics: current value + change columns for each selected period
    CAP_METRICS.forEach(metric => {
      const currentName = `${metric} (GB)`;
      const currentIdx = columns.indexOf(currentName);
      if (currentIdx >= 0) visibleColMeta.push({ rawIdx: currentIdx, isChange: false, label: currentName });

      sortedSelected.forEach(period => {
        const periodMap = capChangeColMap[period];
        if (periodMap && periodMap[metric]) {
          const chgIdx = periodMap[metric].change;
          if (chgIdx >= 0) {
            // Abbreviate period for column label: "-1 Months" → "-1M", "-7 Days" → "-7D"
            const shortPeriod = period.replace(/\s*Months?/, 'M').replace(/\s*Days?/, 'D');
            const chgLabel = `${metric} Chg ${shortPeriod}`;
            visibleColMeta.push({ rawIdx: chgIdx, isChange: true, label: chgLabel });
          }
        }
      });
    });

    // Trailing columns
    const trailingCols = ['Status', 'SLA Domain', 'Protected On',
                          'Local Data Reduction (%)', 'Local Dedup Ratio (x)', 'UniqueKey'];
    trailingCols.forEach(name => {
      const idx = columns.indexOf(name);
      if (idx >= 0) visibleColMeta.push({ rawIdx: idx, isChange: false, label: name });
    });

    visibleColIndices = visibleColMeta.map(m => m.rawIdx);
  }

  function configureTopbar() {
    // Elements only shown in standard mode
    const stdEls = ['tz-divider', 'tz-label', 'tz-controls',
                    'dur-divider', 'dur-label', 'dur-controls',
                    'prefilter-divider', 'log-filter-wrap', 'idx-filter-wrap',
                    'rowlimit-divider', 'rowlimit-label', 'row-limit-sel', 'rowlimit-events-label'];
    // Elements only shown in capacity change mode
    const capChgEls = ['period-divider', 'period-label', 'period-checks'];

    if (isCapChangeMode) {
      stdEls.forEach(id => { const el = document.getElementById(id); if (el) el.style.display = 'none'; });
      capChgEls.forEach(id => { const el = document.getElementById(id); if (el) el.style.display = ''; });

      // Populate period checkboxes
      const checks = document.getElementById('period-checks');
      checks.style.display = 'flex';
      checks.innerHTML = capChangePeriods.map(p =>
        `<label class="period-check">
          <input type="checkbox" ${selectedPeriods.has(p) ? 'checked' : ''} value="${escHtml(p)}" onchange="changePeriod()">
          <span>${escHtml(p)}</span>
        </label>`
      ).join('');

      buildVisibleCols();
    } else {
      stdEls.forEach(id => { const el = document.getElementById(id); if (el) el.style.display = ''; });
      capChgEls.forEach(id => { const el = document.getElementById(id); if (el) el.style.display = 'none'; });
      document.getElementById('summary-bar').style.display = 'none';
    }
  }

  function changePeriod() {
    const checks = document.querySelectorAll('#period-checks input[type="checkbox"]');
    const checked = [...checks].filter(cb => cb.checked).map(cb => cb.value);
    // Enforce at least one selected
    if (checked.length === 0) {
      checks[0].checked = true;
      checked.push(checks[0].value);
    }
    selectedPeriods = new Set(checked);
    buildVisibleCols();
    buildHeaders();
    applyFilters();
  }

  function updateSummary() {
    const bar = document.getElementById('summary-bar');
    if (!isCapChangeMode) { bar.style.display = 'none'; return; }
    bar.style.display = 'block';

    const rows = displayRows;
    const totalObjects = rows.length;
    const unitLabel = unit;
    const shortNames = {
      'Logical Bytes': 'Logical',
      'Used Size': 'Used',
      'Data Stored': 'Data Stored',
      'Archive Storage': 'Archive',
      'Replica Storage': 'Replica'
    };

    // Count baseline objects = rows where Status is "Active"
    const statusIdx = columns.indexOf('Status');
    const baselineObjects = statusIdx >= 0
      ? rows.filter(r => r[statusIdx] === 'Active').length
      : totalObjects;

    // Compute baseline sums (current values) — Active objects only
    const baselineSums = {};
    CAP_METRICS.forEach(m => { baselineSums[m] = 0; });
    rows.forEach(row => {
      if (statusIdx >= 0 && row[statusIdx] !== 'Active') return;
      CAP_METRICS.forEach(metric => {
        const idx = columns.indexOf(`${metric} (GB)`);
        if (idx >= 0) baselineSums[metric] += (parseFloat(row[idx]) || 0);
      });
    });

    // Compute per-period: historical sums and object count
    // An object existed in a period if any of its 5 value columns are non-zero
    const periodData = {};
    capChangePeriods.forEach(period => {
      const pm = capChangeColMap[period];
      const sums = {};
      CAP_METRICS.forEach(m => { sums[m] = 0; });
      let periodObjects = 0;
      rows.forEach(row => {
        let hasData = false;
        CAP_METRICS.forEach(metric => {
          const valIdx = pm[metric]?.value;
          if (valIdx >= 0) {
            const v = parseFloat(row[valIdx]) || 0;
            sums[metric] += v;
            if (v !== 0) hasData = true;
          }
        });
        if (hasData) periodObjects++;
      });
      periodData[period] = { sums, periodObjects };
    });

    // Summary always uses TB since values are aggregated across all objects
    const summaryUnit = 'TB';
    function fmtSummary(gb) {
      const v = gb / 1000;
      return v.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    // Build table HTML
    let html = '<table>';
    // Header
    html += '<tr><th>Period</th>';
    CAP_METRICS.forEach(m => { html += `<th>${shortNames[m]} (${summaryUnit})</th>`; });
    html += '<th>Objects</th></tr>';

    // Baseline row — Active objects only
    html += '<tr class="baseline-row"><td>Baseline (current)</td>';
    CAP_METRICS.forEach(m => { html += `<td>${fmtSummary(baselineSums[m])}</td>`; });
    html += `<td>${baselineObjects.toLocaleString()}</td></tr>`;

    // Period rows — objects that existed in each period
    capChangePeriods.forEach(period => {
      const pd = periodData[period];
      html += `<tr><td>${escHtml(period)}</td>`;
      CAP_METRICS.forEach(m => { html += `<td>${fmtSummary(pd.sums[m])}</td>`; });
      html += `<td>${pd.periodObjects.toLocaleString()}</td></tr>`;
    });

    html += '</table>';
    document.getElementById('summary-content').innerHTML = html;
  }

  // ── Column resize ──────────────────────────────────────────────────
  function switchToFixedLayout() {
    const table = document.getElementById('data-table');
    if (table.style.tableLayout === 'fixed') return;
    const headerThs = document.getElementById('header-names').querySelectorAll('th');
    const filterThs = document.getElementById('header-filters').querySelectorAll('th');
    // Capture current widths before switching layout
    const widths = Array.from(headerThs).map(th => th.offsetWidth);
    const totalW = widths.reduce((a, b) => a + b, 0);
    table.style.tableLayout = 'fixed';
    table.style.width = totalW + 'px';
    table.style.minWidth = '0';
    // Lock all columns at their current widths
    widths.forEach((w, i) => {
      const px = w + 'px';
      headerThs[i].style.width = px;
      headerThs[i].style.minWidth = px;
      headerThs[i].style.maxWidth = px;
      if (filterThs[i]) {
        filterThs[i].style.width = px;
        filterThs[i].style.minWidth = px;
        filterThs[i].style.maxWidth = px;
      }
    });
  }

  function attachResizeHandles() {
    document.querySelectorAll('#header-names th').forEach(th => {
      const handle = document.createElement('div');
      handle.className = 'col-resize-handle';
      handle.addEventListener('mousedown', e => {
        e.preventDefault();
        e.stopPropagation();
        switchToFixedLayout();
        const colIdx = Array.from(th.parentNode.children).indexOf(th);
        const filterTh = document.getElementById('header-filters').children[colIdx];
        const startX = e.pageX;
        const startW = th.offsetWidth;
        document.body.classList.add('col-resizing');
        function onMove(e2) {
          const newW = Math.max(30, startW + (e2.pageX - startX));
          const px = newW + 'px';
          th.style.width = px;
          th.style.minWidth = px;
          th.style.maxWidth = px;
          if (filterTh) {
            filterTh.style.width = px;
            filterTh.style.minWidth = px;
            filterTh.style.maxWidth = px;
          }
        }
        function onUp() {
          document.body.classList.remove('col-resizing');
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          // Re-compute frozen offsets after column resize
          if (isCapChangeMode || stdHasPriority) recomputeFrozenOffsets();
        }
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
      th.appendChild(handle);
    });
  }

  function recomputeFrozenOffsets() {
    const nameRow = document.getElementById('header-names');
    const filterRow = document.getElementById('header-filters');
    const ths = nameRow.querySelectorAll('th');
    const tfs = filterRow.querySelectorAll('th');
    if (isCapChangeMode) {
      let leftOffset = 0;
      const offsets = [];
      visibleColMeta.forEach((meta, vi) => {
        if (meta.frozen) {
          ths[vi].style.left = leftOffset + 'px';
          tfs[vi].style.left = leftOffset + 'px';
          offsets.push(leftOffset);
          leftOffset += ths[vi].offsetWidth;
        }
      });
      visibleColMeta._frozenOffsets = offsets;
    } else if (stdHasPriority) {
      let leftOffset = 0;
      stdFrozenMeta = [];
      const colOrder = stdColOrder.length ? stdColOrder : columns.map((_, i) => i);
      for (let i = 0; i < STD_FROZEN_COUNT && i < ths.length; i++) {
        ths[i].style.left = leftOffset + 'px';
        tfs[i].style.left = leftOffset + 'px';
        stdFrozenMeta.push({ displayIdx: i, rawIdx: colOrder[i], left: leftOffset });
        leftOffset += ths[i].offsetWidth;
      }
    }
  }

  // ── Summary collapse ────────────────────────────────────────────────
  function toggleSummary() {
    const body = document.getElementById('summary-body');
    const icon = document.getElementById('summary-toggle-icon');
    const collapsed = body.style.display === 'none';
    body.style.display = collapsed ? '' : 'none';
    icon.classList.toggle('collapsed', !collapsed);
  }

  // ── Helpers ────────────────────────────────────────────────────────
  let _debounceTimer = null;
  function debouncedApplyFilters() {
    clearTimeout(_debounceTimer);
    _debounceTimer = setTimeout(applyFilters, 2000);
  }

  function parseFilterTerms(filterStr) {
    if (!filterStr) return { positive: [], negative: [] };
    const terms = filterStr.split(',').map(t => t.trim()).filter(t => t);
    const positive = [], negative = [];
    terms.forEach(t => {
      if (t.startsWith('-') && t.length > 1) negative.push(t.slice(1));
      else positive.push(t);
    });
    return { positive, negative };
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escJs(s) { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
</script>
